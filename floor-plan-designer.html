<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOOR PLAN · ARCADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #07071a;
    --bg-2:      #0f0f28;
    --panel:     #1a0f38;
    --play:      #1a1f3f;
    --play-dark: #05050f;
    --neon:      #00f0ff;
    --hot:       #ff2e9a;
    --gold:      #ffd700;
    --green:     #35ff69;
    --red:       #ff2e5a;
    --purple:    #b855ff;
    --text:      #f2f4ff;
    --dim:       #6b72a8;
    --dim-2:     #38406b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(0,0,0,0.22) 2px,
      rgba(0,0,0,0.22) 3px
    );
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.45) 100%);
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
    position: relative;
  }

  .sidebar {
    background: var(--bg-2);
    border-right: 3px solid var(--neon);
    padding: 22px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    box-shadow: 4px 0 24px rgba(0, 240, 255, 0.15);
    position: relative;
    z-index: 2;
  }

  .logo { padding-bottom: 14px; border-bottom: 2px dashed var(--dim-2); }
  .logo h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    line-height: 1.25;
    color: var(--neon);
    text-shadow:
      0 0 6px var(--neon),
      0 0 14px rgba(0, 240, 255, 0.5),
      3px 3px 0 var(--hot);
    letter-spacing: 1px;
  }
  .logo h1 .slash { color: var(--hot); text-shadow: 0 0 6px var(--hot); }
  .logo .subtitle {
    margin-top: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-shadow: 0 0 4px rgba(255, 215, 0, 0.6);
    animation: blink-slow 2s steps(2, end) infinite;
  }

  @keyframes blink-slow { 50% { opacity: 0.35; } }
  @keyframes blink-fast { 50% { opacity: 0.4; } }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-shadow: 0 0 4px rgba(255, 215, 0, 0.5);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 2px;
    background: repeating-linear-gradient(
      90deg,
      var(--dim-2) 0, var(--dim-2) 3px,
      transparent 3px, transparent 6px
    );
  }

  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px;
    background: var(--play-dark);
    border: 2px solid var(--dim-2);
  }
  .mode-btn {
    padding: 11px 6px;
    background: transparent;
    border: none;
    color: var(--dim);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.1s;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active {
    background: var(--neon);
    color: var(--bg);
    box-shadow: 0 0 14px rgba(0, 240, 255, 0.7);
  }

  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .btn {
    padding: 10px 8px;
    background: var(--play-dark);
    border: 2px solid var(--dim-2);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    cursor: pointer;
    letter-spacing: 0.8px;
    transition: all 0.08s;
    position: relative;
  }
  .btn:hover {
    border-color: var(--neon);
    color: var(--neon);
    text-shadow: 0 0 6px var(--neon);
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(1px); }
  .btn.active {
    background: var(--neon);
    color: var(--bg);
    border-color: var(--neon);
    box-shadow: 0 0 14px rgba(0, 240, 255, 0.6);
  }
  .btn.danger { border-color: rgba(255, 46, 90, 0.5); color: var(--red); }
  .btn.danger:hover {
    border-color: var(--red);
    color: var(--red);
    text-shadow: 0 0 6px var(--red);
    box-shadow: 0 0 12px rgba(255, 46, 90, 0.4);
  }
  .btn.armed {
    background: var(--red);
    color: var(--bg);
    border-color: var(--red);
    text-shadow: none;
    box-shadow: 0 0 16px rgba(255, 46, 90, 0.9);
    animation: blink-fast 0.4s steps(2, end) infinite;
  }
  .btn-full { grid-column: 1 / -1; }

  .rooms-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .room-tile {
    padding: 8px 8px 6px;
    background: var(--play-dark);
    border: 2px solid var(--dim-2);
    cursor: pointer;
    text-align: left;
    font-family: 'VT323', monospace;
    color: var(--text);
    transition: all 0.1s;
    position: relative;
  }
  .room-tile:hover { border-color: var(--neon); transform: translateY(-1px); }
  .room-tile.active {
    border-color: var(--hot);
    background: var(--panel);
    box-shadow: 0 0 14px rgba(255, 46, 154, 0.55);
  }
  .room-tile .swatch {
    width: 100%;
    height: 10px;
    margin-bottom: 6px;
    border: 1px solid rgba(0,0,0,0.35);
  }
  .room-tile .name {
    font-family: 'Press Start 2P', monospace;
    font-size: 7.5px;
    line-height: 1.2;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
    color: var(--text);
  }
  .room-tile .size {
    font-family: 'VT323', monospace;
    font-size: 15px;
    line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 4px rgba(255, 215, 0, 0.4);
  }

  .stats {
    background: var(--play-dark);
    border: 2px solid var(--gold);
    padding: 16px 14px 14px;
    position: relative;
    box-shadow:
      0 0 14px rgba(255, 215, 0, 0.25),
      inset 0 0 20px rgba(255, 215, 0, 0.06);
  }
  .stats::before {
    content: "★ SCORE ★";
    position: absolute;
    top: -9px;
    left: 10px;
    background: var(--bg-2);
    padding: 1px 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--gold);
    text-shadow: 0 0 5px var(--gold);
    letter-spacing: 1px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 7px;
  }
  .stat-row .label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .stat-row .value {
    font-family: 'VT323', monospace;
    font-size: 22px;
    line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
  }
  .stat-row.hero .value {
    font-size: 28px;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }
  .progress {
    height: 10px;
    background: var(--play-dark);
    border: 2px solid var(--dim-2);
    margin-top: 6px;
    padding: 1px;
  }
  .progress-bar {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: width 0.2s ease;
  }

  .canvas-area {
    background:
      radial-gradient(ellipse at 30% 30%, rgba(255, 46, 154, 0.08), transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(0, 240, 255, 0.08), transparent 55%),
      var(--bg);
    padding: 36px;
    position: relative;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .canvas-area::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 23% 18%, white, transparent 50%),
      radial-gradient(1px 1px at 77% 45%, var(--neon), transparent 50%),
      radial-gradient(1px 1px at 44% 73%, white, transparent 50%),
      radial-gradient(1px 1px at 12% 82%, var(--hot), transparent 50%),
      radial-gradient(1px 1px at 88% 12%, white, transparent 50%),
      radial-gradient(1px 1px at 58% 31%, var(--gold), transparent 50%);
    opacity: 0.55;
    pointer-events: none;
  }

  .canvas-frame {
    position: relative;
    background: var(--play-dark);
    padding: 18px;
    border: 3px solid var(--neon);
    box-shadow:
      0 0 28px rgba(0, 240, 255, 0.55),
      inset 0 0 24px rgba(0, 240, 255, 0.08);
    z-index: 2;
  }
  .canvas-frame .bolt {
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--hot);
    box-shadow: 0 0 6px var(--hot);
  }
  .bolt.tl { top: 4px; left: 4px; }
  .bolt.tr { top: 4px; right: 4px; }
  .bolt.bl { bottom: 4px; left: 4px; }
  .bolt.br { bottom: 4px; right: 4px; }

  .frame-title {
    position: absolute;
    top: -14px;
    left: 22px;
    background: var(--bg);
    padding: 3px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--hot);
    text-shadow: 0 0 6px rgba(255, 46, 154, 0.7);
    letter-spacing: 1px;
    z-index: 3;
  }
  .frame-scale {
    position: absolute;
    bottom: -12px;
    right: 22px;
    background: var(--bg);
    padding: 3px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--neon);
    text-shadow: 0 0 4px var(--neon);
    letter-spacing: 1px;
    z-index: 3;
  }

  #grid {
    display: block;
    cursor: crosshair;
    position: relative;
    z-index: 1;
  }
  #grid.mode-rooms { cursor: cell; }

  .canvas-frame::after {
    content: "";
    position: absolute;
    left: 18px;
    top: 18px;
    right: 18px;
    bottom: 18px;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(0, 0, 0, 0.3) 2px,
      rgba(0, 0, 0, 0.3) 3px
    );
    z-index: 2;
  }

  .topbar {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    pointer-events: none;
    z-index: 10;
  }
  .chip {
    background: var(--bg-2);
    padding: 8px 14px;
    border: 2px solid var(--neon);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--neon);
    text-shadow: 0 0 6px var(--neon);
    pointer-events: auto;
    box-shadow: 0 0 14px rgba(0, 240, 255, 0.4);
    letter-spacing: 1px;
  }
  .chip.rooms {
    border-color: var(--hot);
    color: var(--hot);
    text-shadow: 0 0 6px var(--hot);
    box-shadow: 0 0 14px rgba(255, 46, 154, 0.4);
  }
  .chip .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: currentColor;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 6px currentColor;
    animation: blink-fast 1s steps(2, end) infinite;
  }

  .credits {
    background: var(--bg-2);
    border: 2px solid var(--gold);
    padding: 6px 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--gold);
    text-shadow: 0 0 4px var(--gold);
    letter-spacing: 1px;
    line-height: 1.6;
    text-align: right;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
  }
  .credits .lit { color: var(--green); text-shadow: 0 0 4px var(--green); }

  .hint {
    position: absolute;
    bottom: 14px;
    left: 14px;
    right: 14px;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .hint-inner {
    background: var(--bg-2);
    border: 2px solid var(--gold);
    color: var(--gold);
    padding: 10px 18px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    line-height: 1.6;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 820px;
    box-shadow: 0 0 14px rgba(255, 215, 0, 0.35);
    text-shadow: 0 0 4px rgba(255, 215, 0, 0.5);
  }
  .hint-inner kbd {
    background: var(--gold);
    color: var(--bg);
    padding: 3px 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    text-shadow: none;
    box-shadow: 0 0 6px rgba(255, 215, 0, 0.6);
  }
  .hint-divider { width: 2px; height: 12px; background: var(--dim-2); }
  .hint-inner strong { color: var(--neon); text-shadow: 0 0 4px var(--neon); font-weight: normal; }

  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim-2); border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--neon); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <h1>FLOOR<br>PLAN<span class="slash">//</span></h1>
      <div class="subtitle">► INSERT COIN ◄</div>
    </div>

    <div>
      <div class="section-title">STAGE</div>
      <div class="mode-switch">
        <button class="mode-btn active" data-mode="land">1. LAND</button>
        <button class="mode-btn" data-mode="rooms">2. ROOMS</button>
      </div>
    </div>

    <div id="land-panel">
      <div class="section-title">PLOT</div>
      <div class="tool-grid">
        <button class="btn active" id="tool-add">+ PAINT</button>
        <button class="btn" id="tool-remove">− ERASE</button>
        <button class="btn btn-full" id="tool-rect">▭ RECT</button>
        <button class="btn" id="preset-rect">10×8 M</button>
        <button class="btn" id="preset-l">L-SHAPE</button>
        <button class="btn danger btn-full" id="tool-clear-land">CLEAR PLOT</button>
      </div>
    </div>

    <div id="rooms-panel" style="display:none;">
      <div class="section-title">ROOM SET</div>
      <div class="rooms-list" id="rooms-palette"></div>
      <div style="margin-top: 10px;">
        <button class="btn danger btn-full" id="clear-rooms">WIPE ROOMS</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-row hero">
        <span class="label">PLOT</span>
        <span class="value" id="stat-land">000 M²</span>
      </div>
      <div class="stat-row">
        <span class="label">USED</span>
        <span class="value" id="stat-rooms">000 M²</span>
      </div>
      <div class="stat-row">
        <span class="label">LEFT</span>
        <span class="value" id="stat-remaining">000 M²</span>
      </div>
      <div class="stat-row">
        <span class="label">FILL</span>
        <span class="value" id="stat-coverage">000 %</span>
      </div>
      <div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>
  </aside>

  <main class="canvas-area">
    <div class="topbar">
      <div class="chip" id="mode-chip"><span class="dot"></span><span id="mode-chip-text">STAGE 1 · LAND</span></div>
      <div class="credits">FLOOR-PLAN ARCADE<br>v1.1 · <span class="lit">1P READY</span></div>
    </div>

    <div class="canvas-frame">
      <div class="bolt tl"></div><div class="bolt tr"></div>
      <div class="bolt bl"></div><div class="bolt br"></div>
      <div class="frame-title">◆ LEVEL 01 · BUILD YER HOUSE ◆</div>
      <canvas id="grid"></canvas>
      <div class="frame-scale">1□ = 1 M² · SCALE 1:100</div>
    </div>

    <div class="hint">
      <div class="hint-inner" id="hint"></div>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════
//  FLOOR PLAN · ARCADE EDITION · v1.1 (resize)
// ══════════════════════════════════════════════════════

const GRID_W = 32;
const GRID_H = 22;
const CELL = 28;
const HANDLE_MARGIN = 7; // pixels around an edge that count as "grab zone"

const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
canvas.width = GRID_W * CELL;
canvas.height = GRID_H * CELL;

// ── STATE ────────────────────────────────────────────
let mode = 'land';
let landTool = 'add';
let landCells = new Set();
let rooms = [];           // each: { id, template, x, y, w, h }
let nextRoomId = 1;

let selectedRoomId = null;
let activeTemplate = null;
let ghost = null;         // { template, x, y, rotation }
let isPainting = false;
let lastPaintedCell = null;
let rectStart = null;
let mousePos = null;
let draggingRoom = null;  // move drag
let resizing = null;      // { id, edge, startCell, origX, origY, origW, origH }

// ── ROOM TEMPLATES ───────────────────────────────────
const roomTemplates = [
  { name: 'MASTER BR', w: 4, h: 4, color: '#00D4FF' },
  { name: 'BEDROOM',   w: 3, h: 4, color: '#35FF69' },
  { name: 'LIVING',    w: 5, h: 5, color: '#FFA040' },
  { name: 'KITCHEN',   w: 3, h: 4, color: '#FF4060' },
  { name: 'DINING',    w: 3, h: 4, color: '#FFD700' },
  { name: 'BATHROOM',  w: 2, h: 3, color: '#40E8E0' },
  { name: 'WC',        w: 1, h: 2, color: '#C6FF4A' },
  { name: 'OFFICE',    w: 3, h: 3, color: '#B855FF' },
  { name: 'CLOSET',    w: 2, h: 2, color: '#FF78D4' },
  { name: 'UTILITY',   w: 2, h: 2, color: '#8899AA' },
  { name: 'ENTRY',     w: 2, h: 2, color: '#FFAA55' },
  { name: 'GARAGE',    w: 5, h: 6, color: '#6E7A99' },
  { name: 'HALLWAY',   w: 1, h: 4, color: '#C0C0D8' },
  { name: 'TERRACE',   w: 4, h: 3, color: '#7FFF3F' },
];

// ── PALETTE ──────────────────────────────────────────
const paletteEl = document.getElementById('rooms-palette');
roomTemplates.forEach((t) => {
  const tile = document.createElement('button');
  tile.className = 'room-tile';
  tile.innerHTML = `
    <div class="swatch" style="background:${t.color}; box-shadow: 0 0 6px ${t.color}80;"></div>
    <div class="name">${t.name}</div>
    <div class="size">${t.w}×${t.h} · ${t.w * t.h}M²</div>
  `;
  tile.addEventListener('click', () => {
    if (activeTemplate === t) { activeTemplate = null; ghost = null; }
    else { activeTemplate = t; ghost = { template: t, x: 0, y: 0, rotation: 0 }; }
    document.querySelectorAll('.room-tile').forEach(el => el.classList.remove('active'));
    if (activeTemplate) tile.classList.add('active');
    selectedRoomId = null;
    updateHint();
    draw();
  });
  paletteEl.appendChild(tile);
});

// ── MODE SWITCH ──────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('land-panel').style.display = mode === 'land' ? '' : 'none';
    document.getElementById('rooms-panel').style.display = mode === 'rooms' ? '' : 'none';
    const chip = document.getElementById('mode-chip');
    chip.classList.toggle('rooms', mode === 'rooms');
    document.getElementById('mode-chip-text').textContent = mode === 'land' ? 'STAGE 1 · LAND' : 'STAGE 2 · ROOMS';
    canvas.classList.toggle('mode-rooms', mode === 'rooms');
    activeTemplate = null; ghost = null; selectedRoomId = null; rectStart = null;
    document.querySelectorAll('.room-tile').forEach(el => el.classList.remove('active'));
    updateHint();
    draw();
  });
});

// ── LAND TOOLS ───────────────────────────────────────
function setLandTool(t) {
  landTool = t;
  ['add','remove','rect'].forEach(k => {
    document.getElementById('tool-' + k).classList.toggle('active', k === t);
  });
  rectStart = null;
  updateHint();
}
document.getElementById('tool-add').addEventListener('click', () => setLandTool('add'));
document.getElementById('tool-remove').addEventListener('click', () => setLandTool('remove'));
document.getElementById('tool-rect').addEventListener('click', () => setLandTool('rect'));

// ── TWO-STEP CLEAR ───────────────────────────────────
function makeArmedClear(btnId, action, label) {
  const btn = document.getElementById(btnId);
  let armed = false, timer = null;
  btn.addEventListener('click', () => {
    if (!armed) {
      armed = true;
      btn.classList.add('armed');
      btn.textContent = '!! SURE ? !!';
      clearTimeout(timer);
      timer = setTimeout(() => {
        armed = false; btn.classList.remove('armed'); btn.textContent = label;
      }, 2000);
    } else {
      clearTimeout(timer);
      armed = false; btn.classList.remove('armed'); btn.textContent = label;
      action();
    }
  });
}
makeArmedClear('tool-clear-land', () => {
  landCells.clear(); rooms = []; selectedRoomId = null;
  updateStats(); draw();
}, 'CLEAR PLOT');
makeArmedClear('clear-rooms', () => {
  rooms = []; selectedRoomId = null;
  updateStats(); draw();
}, 'WIPE ROOMS');

// ── PRESETS ──────────────────────────────────────────
document.getElementById('preset-rect').addEventListener('click', () => {
  landCells.clear(); rooms = []; selectedRoomId = null;
  const ox = 11, oy = 7;
  for (let x = 0; x < 10; x++)
    for (let y = 0; y < 8; y++)
      landCells.add(`${ox+x},${oy+y}`);
  updateStats(); draw();
});
document.getElementById('preset-l').addEventListener('click', () => {
  landCells.clear(); rooms = []; selectedRoomId = null;
  const ox = 9, oy = 6;
  for (let x = 0; x < 13; x++) {

      if (x >= 7 && y < 5) continue;
      landCells.add(`${ox+x},${oy+y}`);
    }
  }
  updateStats(); draw();
});

// ── GEOMETRY ─────────────────────────────────────────
function ghostDim() {
  return ghost.rotation === 0
    ? [activeTemplate.w, activeTemplate.h]
    : [activeTemplate.h, activeTemplate.w];
}
function canPlace(x, y, w, h, ignoreId = null) {
  if (x < 0 || y < 0 || x + w > GRID_W || y + h > GRID_H) return false;
  for (let dx = 0; dx < w; dx++) {
    for (let dy = 0; dy < h; dy++) {
      const cx = x + dx, cy = y + dy;
      if (!landCells.has(`${cx},${cy}`)) return false;
      for (const r of rooms) {
        if (r.id === ignoreId) continue;
        if (cx >= r.x && cx < r.x + r.w && cy >= r.y && cy < r.y + r.h) return false;
      }
    }
  }
  return true;
}
function roomAt(x, y) {
  for (let i = rooms.length - 1; i >= 0; i--) {
    const r = rooms[i];
    if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return r;
  }
  return null;
}
function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: Math.floor((e.clientX - rect.left) / CELL),
    y: Math.floor((e.clientY - rect.top) / CELL),
  };
}
function pixelFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

// Detect which edge/corner of a room is under a pixel coordinate (for resize grab)
function edgeHit(room, pxX, pxY) {
  const rx = room.x * CELL, ry = room.y * CELL;
  const rw = room.w * CELL, rh = room.h * CELL;
  // Must be within bounds (incl. margin)
  if (pxX < rx - HANDLE_MARGIN || pxX > rx + rw + HANDLE_MARGIN) return null;
  if (pxY < ry - HANDLE_MARGIN || pxY > ry + rh + HANDLE_MARGIN) return null;
  const nearL = Math.abs(pxX - rx) <= HANDLE_MARGIN;
  const nearR = Math.abs(pxX - (rx + rw)) <= HANDLE_MARGIN;
  const nearT = Math.abs(pxY - ry) <= HANDLE_MARGIN;
  const nearB = Math.abs(pxY - (ry + rh)) <= HANDLE_MARGIN;
  if (nearT && nearL) return 'NW';
  if (nearT && nearR) return 'NE';
  if (nearB && nearL) return 'SW';
  if (nearB && nearR) return 'SE';
  if (nearT) return 'N';
  if (nearB) return 'S';
  if (nearL) return 'W';
  if (nearR) return 'E';
  return null;
}
function edgeCursor(edge) {
  return {
    N: 'ns-resize', S: 'ns-resize',
    W: 'ew-resize', E: 'ew-resize',
    NW: 'nwse-resize', SE: 'nwse-resize',
    NE: 'nesw-resize', SW: 'nesw-resize',
  }[edge];
}

// ── PAINT ────────────────────────────────────────────
function paintCell(x, y) {
  const key = `${x},${y}`;
  if (landTool === 'add') landCells.add(key);
  else if (landTool === 'remove') {
    landCells.delete(key);
    const before = rooms.length;
    rooms = rooms.filter(r => {
      for (let dx = 0; dx < r.w; dx++)
        for (let dy = 0; dy < r.h; dy++)
          if (!landCells.has(`${r.x+dx},${r.y+dy}`)) return false;
      return true;
    });
    if (rooms.length !== before) selectedRoomId = null;
  }
  updateStats();
}
function paintLine(x0, y0, x1, y1) {
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy, x = x0, y = y0;
  while (true) {
    if (x >= 0 && y >= 0 && x < GRID_W && y < GRID_H) paintCell(x, y);
    if (x === x1 && y === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x += sx; }
    if (e2 <  dx) { err += dx; y += sy; }
  }
}

// ── MOUSE DOWN ───────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const { x, y } = cellFromEvent(e);
  if (x < 0 || y < 0 || x >= GRID_W || y >= GRID_H) return;
  mousePos = { x, y };

  if (mode === 'land') {
    if (landTool === 'rect') {
      rectStart = { x, y };
    } else {
      isPainting = true;
      paintCell(x, y);
      lastPaintedCell = { x, y };
    }
  } else {
    // Placing new room from palette
    if (ghost && activeTemplate) {
      const [w, h] = ghostDim();
      if (canPlace(ghost.x, ghost.y, w, h)) {
        rooms.push({
          id: nextRoomId++,
          template: activeTemplate,
          x: ghost.x, y: ghost.y, w, h
        });
        updateStats();
      }
    } else {
      // Check for resize on currently selected room
      const sel = rooms.find(r => r.id === selectedRoomId);
      if (sel) {
        const px = pixelFromEvent(e);
        const edge = edgeHit(sel, px.x, px.y);
        if (edge) {
          resizing = {
            id: sel.id,
            edge,
            startCell: { x, y },
            origX: sel.x, origY: sel.y,
            origW: sel.w, origH: sel.h
          };
          canvas.style.cursor = edgeCursor(edge);
          draw();
          return;
        }
      }
      // Otherwise: select/move
      const r = roomAt(x, y);
      if (r) {
        selectedRoomId = r.id;
        draggingRoom = {
          id: r.id,
          offsetX: x - r.x, offsetY: y - r.y,
          origX: r.x, origY: r.y,
          moved: false
        };
        canvas.style.cursor = 'grabbing';
      } else {
        selectedRoomId = null;
      }
    }
    updateHint();
  }
  draw();
});

// ── MOUSE MOVE ───────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const { x, y } = cellFromEvent(e);
  mousePos = { x, y };

  if (mode === 'land') {
    if (isPainting) {
      if (lastPaintedCell) paintLine(lastPaintedCell.x, lastPaintedCell.y, x, y);
      else if (x >= 0 && y >= 0 && x < GRID_W && y < GRID_H) paintCell(x, y);
      lastPaintedCell = { x, y };
    }
  } else {
    if (resizing) {
      // Compute target size from origin + current cell delta
      const dx = x - resizing.startCell.x;
      const dy = y - resizing.startCell.y;
      let nx = resizing.origX, ny = resizing.origY;
      let nw = resizing.origW, nh = resizing.origH;

      if (resizing.edge.includes('N')) {
        ny = resizing.origY + dy;
        nh = resizing.origH - dy;
        if (nh < 1) { nh = 1; ny = resizing.origY + resizing.origH - 1; }
      }
      if (resizing.edge.includes('S')) {
        nh = resizing.origH + dy;
        if (nh < 1) nh = 1;
      }
      if (resizing.edge.includes('W')) {
        nx = resizing.origX + dx;
        nw = resizing.origW - dx;
        if (nw < 1) { nw = 1; nx = resizing.origX + resizing.origW - 1; }
      }
      if (resizing.edge.includes('E')) {
        nw = resizing.origW + dx;
        if (nw < 1) nw = 1;
      }

      // Only apply if valid — otherwise keep last valid state so room doesn't
      // visually overlap obstacles; user can drag back to find a valid size.
      const r = rooms.find(rr => rr.id === resizing.id);
      if (r && canPlace(nx, ny, nw, nh, r.id)) {
        r.x = nx; r.y = ny; r.w = nw; r.h = nh;
        updateStats();
      }
    } else if (ghost && activeTemplate) {
      ghost.x = x; ghost.y = y;
    } else if (draggingRoom) {
      const r = rooms.find(r => r.id === draggingRoom.id);
      if (r) {
        const nx = x - draggingRoom.offsetX;
        const ny = y - draggingRoom.offsetY;
        if (nx !== r.x || ny !== r.y) {
          draggingRoom.moved = true;
          r.x = nx; r.y = ny;
        }
      }
    } else {
      // Idle: update cursor based on whether we're over a resize handle
      const sel = rooms.find(r => r.id === selectedRoomId);
      if (sel) {
        const px = pixelFromEvent(e);
        const edge = edgeHit(sel, px.x, px.y);
        if (edge) canvas.style.cursor = edgeCursor(edge);
        else if (roomAt(x, y) === sel) canvas.style.cursor = 'grab';
        else canvas.style.cursor = '';
      } else {
        canvas.style.cursor = '';
      }
    }
  }
  draw();
});

// ── MOUSE UP ─────────────────────────────────────────
canvas.addEventListener('mouseup', e => {
  if (mode === 'land') {
    if (landTool === 'rect' && rectStart) {
      const { x, y } = cellFromEvent(e);
      const x1 = Math.max(0, Math.min(rectStart.x, x));
      const x2 = Math.min(GRID_W - 1, Math.max(rectStart.x, x));
      const y1 = Math.max(0, Math.min(rectStart.y, y));
      const y2 = Math.min(GRID_H - 1, Math.max(rectStart.y, y));
      for (let cx = x1; cx <= x2; cx++)
        for (let cy = y1; cy <= y2; cy++)
          landCells.add(`${cx},${cy}`);
      rectStart = null;
      updateStats();
    }
    isPainting = false;
    lastPaintedCell = null;
  } else {
    if (resizing) {
      // We only ever applied valid states during drag, so no revert needed
      resizing = null;
      canvas.style.cursor = '';
    }
    if (draggingRoom) {
      const r = rooms.find(r => r.id === draggingRoom.id);
      if (r && draggingRoom.moved) {
        if (!canPlace(r.x, r.y, r.w, r.h, r.id)) {
          r.x = draggingRoom.origX;
          r.y = draggingRoom.origY;
        }
      }
      draggingRoom = null;
      canvas.style.cursor = '';
    }
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  mousePos = null;
  isPainting = false;
  lastPaintedCell = null;
  canvas.style.cursor = '';
  draw();
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (ghost) ghost.rotation = (ghost.rotation + 1) % 2;
  else if (selectedRoomId) rotateSelected();
  draw();
});

// ── KEYBOARD ─────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'r' || e.key === 'R') {
    if (ghost) { ghost.rotation = (ghost.rotation + 1) % 2; draw(); }
    else if (selectedRoomId) { rotateSelected(); draw(); }
  } else if (e.key === 'Escape') {
    activeTemplate = null; ghost = null; selectedRoomId = null; rectStart = null;
    document.querySelectorAll('.room-tile').forEach(el => el.classList.remove('active'));
    updateHint(); draw();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedRoomId != null) {
      e.preventDefault();
      rooms = rooms.filter(r => r.id !== selectedRoomId);
      selectedRoomId = null;
      updateStats(); draw();
    }
  }
});

function rotateSelected() {
  const r = rooms.find(x => x.id === selectedRoomId);
  if (!r) return;
  const nw = r.h, nh = r.w;
  if (canPlace(r.x, r.y, nw, nh, r.id)) {
    r.w = nw; r.h = nh;
    updateStats();
    return;
  }
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (canPlace(r.x + dx, r.y + dy, nw, nh, r.id)) {
        r.x += dx; r.y += dy; r.w = nw; r.h = nh;
        updateStats();
        return;
      }
    }
  }
}

// ── STATS ────────────────────────────────────────────
function pad(n) { return String(n).padStart(3, '0'); }
function updateStats() {
  const land = landCells.size;
  const used = rooms.reduce((s, r) => s + r.w * r.h, 0);
  const remaining = Math.max(0, land - used);
  const coverage = land > 0 ? Math.round((used / land) * 100) : 0;
  document.getElementById('stat-land').textContent = `${pad(land)} M²`;
  document.getElementById('stat-rooms').textContent = `${pad(used)} M²`;
  document.getElementById('stat-remaining').textContent = `${pad(remaining)} M²`;
  document.getElementById('stat-coverage').textContent = `${pad(coverage)} %`;
  document.getElementById('progress-bar').style.width = coverage + '%';
}

// ── HINT ─────────────────────────────────────────────
function updateHint() {
  const el = document.getElementById('hint');
  if (mode === 'land') {
    const action =
      landTool === 'add'    ? 'DRAG TO PAINT LAND' :
      landTool === 'remove' ? 'DRAG TO ERASE' :
                              'DRAG FOR RECTANGLE';
    el.innerHTML = `<span>► ${action}</span><span class="hint-divider"></span><span>OR PICK A <strong>PRESET</strong></span>`;
  } else {
    if (activeTemplate) {
      el.innerHTML = `
        <span>► PLACING <strong>${activeTemplate.name}</strong></span>
        <span class="hint-divider"></span>
        <span><kbd>CLICK</kbd> DROP</span>
        <span><kbd>R</kbd> SPIN</span>
        <span><kbd>ESC</kbd> BAIL</span>`;
    } else if (selectedRoomId != null) {
      el.innerHTML = `
        <span>► <strong>SELECTED</strong> · DRAG EDGE TO RESIZE</span>
        <span class="hint-divider"></span>
        <span><kbd>DRAG</kbd> MOVE</span>
        <span><kbd>R</kbd> SPIN</span>
        <span><kbd>DEL</kbd> TRASH</span>`;
    } else {
      el.innerHTML = `
        <span>► PICK A ROOM · OR CLICK ONE TO RESIZE</span>
        <span class="hint-divider"></span>
        <span><kbd>DRAG</kbd> MOVE</span>
        <span><kbd>R</kbd> SPIN</span>`;
    }
  }
}

// Update hint on selection changes by wrapping draw
const _origDraw = () => {}; // placeholder — real draw defined below
// (we'll call updateHint() explicitly wherever selection changes)

// ── COLOR UTILS ──────────────────────────────────────
function hexToRgb(hex) {
  const c = parseInt(hex.slice(1), 16);
  return [(c >> 16) & 255, (c >> 8) & 255, c & 255];
}
function rgbStr([r, g, b]) { return `rgb(${r|0},${g|0},${b|0})`; }
function lighten(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return rgbStr([r + (255-r)*amt, g + (255-g)*amt, b + (255-b)*amt]);
}
function darken(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return rgbStr([r*(1-amt), g*(1-amt), b*(1-amt)]);
}

// ── DRAW ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // deep space base
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // buildable cells
  ctx.fillStyle = '#131a38';
  for (const key of landCells) {
    const [x, y] = key.split(',').map(Number);
    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
  }

  // minor grid
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.10)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i <= GRID_W; i++) {
    ctx.moveTo(i * CELL + 0.5, 0);
    ctx.lineTo(i * CELL + 0.5, GRID_H * CELL);
  }
  for (let j = 0; j <= GRID_H; j++) {
    ctx.moveTo(0, j * CELL + 0.5);
    ctx.lineTo(GRID_W * CELL, j * CELL + 0.5);
  }
  ctx.stroke();

  // major grid (every 5m)
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.28)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i <= GRID_W; i += 5) {
    ctx.moveTo(i * CELL + 0.5, 0);
    ctx.lineTo(i * CELL + 0.5, GRID_H * CELL);
  }
  for (let j = 0; j <= GRID_H; j += 5) {
    ctx.moveTo(0, j * CELL + 0.5);
    ctx.lineTo(GRID_W * CELL, j * CELL + 0.5);
  }
  ctx.stroke();

  // plot outline (glowing)
  ctx.strokeStyle = '#00f0ff';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#00f0ff';
  ctx.shadowBlur = 8;
  for (const key of landCells) {
    const [x, y] = key.split(',').map(Number);
    ctx.beginPath();
    if (!landCells.has(`${x-1},${y}`)) { ctx.moveTo(x * CELL, y * CELL); ctx.lineTo(x * CELL, (y+1) * CELL); }
    if (!landCells.has(`${x+1},${y}`)) { ctx.moveTo((x+1) * CELL, y * CELL); ctx.lineTo((x+1) * CELL, (y+1) * CELL); }
    if (!landCells.has(`${x},${y-1}`)) { ctx.moveTo(x * CELL, y * CELL); ctx.lineTo((x+1) * CELL, y * CELL); }
    if (!landCells.has(`${x},${y+1}`)) { ctx.moveTo(x * CELL, (y+1) * CELL); ctx.lineTo((x+1) * CELL, (y+1) * CELL); }
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // rooms
  for (const r of rooms) drawRoom(r, r.id === selectedRoomId);

  // rectangle preview
  if (rectStart && mousePos && mode === 'land' && landTool === 'rect') {
    const x1 = Math.min(rectStart.x, mousePos.x);
    const x2 = Math.max(rectStart.x, mousePos.x);
    const y1 = Math.min(rectStart.y, mousePos.y);
    const y2 = Math.max(rectStart.y, mousePos.y);
    ctx.fillStyle = 'rgba(0, 240, 255, 0.18)';
    ctx.fillRect(x1 * CELL, y1 * CELL, (x2-x1+1) * CELL, (y2-y1+1) * CELL);
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 6;
    ctx.strokeRect(x1 * CELL + 1, y1 * CELL + 1, (x2-x1+1) * CELL - 2, (y2-y1+1) * CELL - 2);
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#00f0ff';
    ctx.font = '700 14px "VT323", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const dw = x2 - x1 + 1, dh = y2 - y1 + 1;
    ctx.fillText(`${dw}×${dh} · ${dw*dh} M²`, (x1 + dw/2) * CELL, (y1 + dh/2) * CELL);
  }

  // ghost preview (placement)
  if (ghost && activeTemplate && mousePos && mode === 'rooms') {
    const [w, h] = ghostDim();
    const valid = canPlace(ghost.x, ghost.y, w, h);
    drawRoom({
      template: activeTemplate,
      x: ghost.x, y: ghost.y, w, h
    }, false, valid ? 0.55 : 0.3, !valid);
  }

  // hover cell indicator (land mode)
  if (mousePos && mode === 'land' && !isPainting && !rectStart &&
      mousePos.x >= 0 && mousePos.y >= 0 && mousePos.x < GRID_W && mousePos.y < GRID_H) {
    ctx.fillStyle = landTool === 'remove' ? 'rgba(255, 46, 90, 0.22)' : 'rgba(0, 240, 255, 0.2)';
    ctx.fillRect(mousePos.x * CELL, mousePos.y * CELL, CELL, CELL);
    ctx.strokeStyle = landTool === 'remove' ? '#ff2e5a' : '#00f0ff';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(mousePos.x * CELL + 0.75, mousePos.y * CELL + 0.75, CELL - 1.5, CELL - 1.5);
  }
}

// ── ROOM TILE (Tetris 3D-bevel + resize handles) ─────
function drawRoom(r, selected, alpha = 1, invalid = false) {
  const { w, h } = r;
  const px = r.x * CELL;
  const py = r.y * CELL;
  const pw = w * CELL;
  const ph = h * CELL;
  const color = invalid ? '#ff2e5a' : r.template.color;

  ctx.globalAlpha = alpha;

  // outer dark edge
  ctx.fillStyle = darken(color, 0.55);
  ctx.fillRect(px, py, pw, ph);

  // main fill
  ctx.fillStyle = color;
  ctx.fillRect(px + 3, py + 3, pw - 6, ph - 6);

  // highlight (top + left)
  ctx.fillStyle = lighten(color, 0.5);
  ctx.fillRect(px, py, pw, 3);
  ctx.fillRect(px, py, 3, ph);

  // shadow (bottom + right)
  ctx.fillStyle = darken(color, 0.5);
  ctx.fillRect(px, py + ph - 3, pw, 3);
  ctx.fillRect(px + pw - 3, py, 3, ph);

  // outline
  ctx.strokeStyle = invalid ? '#ff2e5a' : 'rgba(0, 0, 0, 0.55)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 0.5, py + 0.5, pw - 1, ph - 1);

  // inner separator
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 3.5, py + 3.5, pw - 7, ph - 7);

  // selection ring + resize handles
  if (selected) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 3]);
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;

    // Resize handles — 4 corners + 4 edge midpoints
    const hs = 9;
    const hs2 = hs / 2;
    const handles = [
      [px, py],                        // NW
      [px + pw, py],                   // NE
      [px, py + ph],                   // SW
      [px + pw, py + ph],              // SE
      [px + pw / 2, py],               // N
      [px + pw / 2, py + ph],          // S
      [px, py + ph / 2],               // W
      [px + pw, py + ph / 2],          // E
    ];
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    for (const [hx, hy] of handles) {
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(hx - hs2, hy - hs2, hs, hs);
      ctx.strokeStyle = '#0a0a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(hx - hs2 + 0.5, hy - hs2 + 0.5, hs - 1, hs - 1);
    }
    ctx.shadowBlur = 0;
  }

  // label
  const minDim = Math.min(w, h);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#0a0a1a';

  if (minDim >= 2) {
    const nameSize = Math.min(11, 7 + minDim);
    ctx.font = `${nameSize}px "Press Start 2P", monospace`;
    ctx.fillText(r.template.name, px + pw / 2, py + ph / 2 - 6);
    ctx.font = '700 14px "VT323", monospace';
    ctx.fillStyle = 'rgba(10, 10, 26, 0.8)';
    ctx.fillText(`${w}×${h}·${w*h}M²`, px + pw / 2, py + ph / 2 + 10);
  } else {
    ctx.save();
    ctx.translate(px + pw / 2, py + ph / 2);
    if (h > w) ctx.rotate(-Math.PI / 2);
    ctx.font = '8px "Press Start 2P", monospace';
    ctx.fillText(r.template.name, 0, 0);
    ctx.restore();
  }

  ctx.globalAlpha = 1;
}

// ── INIT ─────────────────────────────────────────────
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(draw);
}
updateHint();
updateStats();
draw();
</script>

</body>
</html>
